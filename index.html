<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<!-- build marker: date-engine-v3-strict-dd-mm-yyyy -->

<title>Aaradhya Rx Command</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
/* ═══════════ TOKENS ═══════════ */
:root{
  --bg:       #070B12;
  --panel:    #0E1420;
  --panel2:   #121A28;
  --cyan:     #2DD4F5;
  --cyan2:    #1AA8C4;
  --amber:    #F5B43D;
  --green:    #2ECC8F;
  --red:      #F0517E;
  --text:     #D7E1EC;
  --text2:    #8DA0B5;
  --text3:    #51647B;
  --border:   rgba(45,212,245,.16);
  --border2:  rgba(45,212,245,.08);
  --r:        10px;
  --r2:       6px;
}

/* ═══════════ RESET — mobile-first base ═══════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{
  font-family:'Inter',sans-serif;
  font-size:15px;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
a{text-decoration:none;color:inherit}
button{font-family:inherit;cursor:pointer;border:none;background:none}
.rj{font-family:'Rajdhani',sans-serif}
.mono{font-family:'Share Tech Mono',monospace}

/* ═══════════ TOPBAR ═══════════ */
.topbar{
  height:54px;padding:0 14px;display:flex;align-items:center;gap:10px;
  position:sticky;top:0;z-index:300;
  background:rgba(7,11,18,.96);
  border-bottom:1px solid var(--border);
  backdrop-filter:blur(10px);
}
.logo-wrap{width:32px;height:32px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.logo-pill{
  width:32px;height:32px;border-radius:50%;
  background:linear-gradient(135deg,#2DD4F522,#2ECC8F22);
  border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  position:relative;flex-shrink:0;
}
.logo-pill span{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:13px;color:var(--cyan)}
.logo-dot{position:absolute;width:6px;height:6px;border-radius:50%;background:var(--green)}
.bar-brand{flex:1;min-width:0}
.bar-title{font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;letter-spacing:.02em;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-title .long{display:none}
.bar-sub{font-size:9px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px;letter-spacing:.02em}
.bar-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.tab-rack{display:none}
.hbtn{
  padding:6px 10px;border-radius:var(--r2);font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;
  letter-spacing:.04em;border:1px solid var(--border2);color:var(--text2);
  display:inline-flex;align-items:center;gap:5px;transition:background .12s,color .12s;
  min-height:34px;
}
.hbtn-cyan{color:var(--cyan);border-color:var(--border)}
.hbtn-ghost{color:var(--text2)}
.hbtn:active{background:rgba(45,212,245,.08)}

/* ═══════════ SHELL ═══════════ */
.shell{max-width:680px;margin:0 auto;padding:12px 12px 90px}

/* ═══════════ LOADING / ERROR ═══════════ */
.loading-scr{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:70px 20px;gap:14px}
.spinner{width:34px;height:34px;border-radius:50%;border:2.5px solid var(--border2);border-top-color:var(--cyan);animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-scr .lt{font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:600;color:var(--cyan);letter-spacing:.06em;text-transform:uppercase}
.loading-scr .ls{font-size:11px;color:var(--text3)}
.err-bar{background:rgba(240,81,126,.08);border:1px solid rgba(240,81,126,.3);border-radius:var(--r2);padding:11px 14px;font-size:13px;color:var(--red);margin-bottom:14px}

/* ═══════════ LOGIN SCREEN ═══════════ */
.login-scr{
  position:fixed;inset:0;z-index:1000;
  display:flex;align-items:center;justify-content:center;
  background:var(--bg);
  padding:20px;
}
.login-card{
  width:100%;max-width:340px;
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:var(--r);
  padding:28px 22px 22px;
  text-align:center;
}
.login-title{font-family:'Rajdhani',sans-serif;font-size:18px;font-weight:700;letter-spacing:.04em;color:var(--text);margin-bottom:3px}
.login-sub{font-family:'Rajdhani',sans-serif;font-size:10px;font-weight:600;letter-spacing:.1em;color:var(--text3);margin-bottom:22px}
.login-field{text-align:left;margin-bottom:13px}
.login-field label{display:block;font-family:'Rajdhani',sans-serif;font-size:10px;font-weight:700;letter-spacing:.06em;color:var(--text2);margin-bottom:5px}
.login-field input{
  width:100%;box-sizing:border-box;
  background:var(--panel2);
  border:1px solid var(--border2);
  border-radius:var(--r2);
  padding:13px 12px;
  font-family:'Share Tech Mono',monospace;
  font-size:15px;color:var(--text);
  outline:none;
}
.login-field input:focus{border-color:var(--cyan)}
.login-field input::placeholder{color:var(--text3)}
.login-err{
  text-align:left;font-size:12px;color:var(--red);
  background:rgba(240,81,126,.08);border:1px solid rgba(240,81,126,.25);
  border-radius:var(--r2);padding:9px 11px;margin-bottom:13px;
}
.login-btn{
  width:100%;
  background:var(--cyan);
  color:#06222B;
  border:none;border-radius:var(--r2);
  padding:13px;
  font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;letter-spacing:.04em;
  cursor:pointer;
  min-height:46px;
}
.login-btn:active{filter:brightness(.92)}
.login-hint{margin-top:16px;font-size:11px;color:var(--text3);line-height:1.5}
.login-hint strong{color:var(--text2)}

/* ═══════════ SECTION PANEL ═══════════ */
.panel{
  background:var(--panel);border-radius:var(--r);
  border:1px solid var(--border);margin-bottom:12px;overflow:hidden;
}
.panel-hd{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid var(--border2)}
.panel-title{font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--cyan)}
.panel-tag{font-family:'Rajdhani',sans-serif;font-size:10px;font-weight:600;letter-spacing:.04em;padding:3px 9px;border-radius:var(--r2);background:rgba(45,212,245,.08);color:var(--cyan2);border:1px solid var(--border2)}

/* ═══════════ METRICS ═══════════ */
.metrics-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.metrics-grid .mc:first-child{grid-column:1/-1}
.mc{
  background:var(--panel);border-radius:var(--r);padding:14px;
  border:1px solid var(--border);
}
.mc.hero{border-color:rgba(45,212,245,.3);background:linear-gradient(135deg,#0B1622,#0E1A28)}
.mc-ico{font-size:16px;margin-bottom:8px;line-height:1}
.mc-lbl{font-family:'Rajdhani',sans-serif;font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-bottom:4px}
.mc-val{font-family:'Rajdhani',sans-serif;font-size:23px;font-weight:700;line-height:1;color:var(--text)}
.mc.hero .mc-val{color:var(--cyan);font-size:24px}
.mc-sub{font-size:11px;color:var(--text3);margin-top:4px}
@media(min-width:560px){
  .metrics-grid{grid-template-columns:1.3fr 1fr 1fr}
  .metrics-grid .mc:first-child{grid-column:auto}
  .metrics-grid-4{grid-template-columns:1.3fr 1fr 1fr 1fr}
}

/* ═══════════ TIER GRID ═══════════ */
.tier-grid{display:grid;grid-template-columns:repeat(3,1fr)}
.tc{padding:13px 6px;text-align:center;border-right:1px solid var(--border2);border-top:1px solid var(--border2)}
.tc:nth-child(3n){border-right:none}
.tc:nth-child(-n+3){border-top:none}
.tc-emoji{font-size:18px;line-height:1;margin-bottom:4px;display:block}
.tc-nm{font-family:'Rajdhani',sans-serif;font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-bottom:5px}
.tc-ct{font-family:'Rajdhani',sans-serif;font-size:25px;font-weight:700;line-height:1;margin-bottom:3px}
.tc-mn{font-size:9px;color:var(--text3)}
@media(min-width:560px){
  .tier-grid{grid-template-columns:repeat(5,1fr)}
  .tc{border-top:none}
  .tc:last-child{border-right:none}
  .tc-ct{font-size:30px}
}

/* ═══════════ TOP PURCHASERS ═══════════ */
.top-row{display:flex;align-items:center;gap:10px;padding:11px 12px;border-bottom:1px solid var(--border2)}
.top-row:last-child{border-bottom:none}
.top-row:active{background:rgba(45,212,245,.05)}
.rank-orb{
  width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;flex-shrink:0;
  border:1.5px solid;
}
.tr-info{flex:1;min-width:0}
.tr-name{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tr-meta{font-size:11px;color:var(--text3);margin-top:2px;display:flex;align-items:center;gap:5px}
.tr-right{text-align:right;flex-shrink:0}
.tr-amt{font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700}
.tr-badge{display:none}
.tr-chev{color:var(--text3);font-size:16px;opacity:.5;flex-shrink:0;margin-left:2px}
@media(min-width:560px){
  .top-row{padding:12px 16px;gap:12px}
  .rank-orb{width:32px;height:32px;font-size:12px}
  .tr-name{font-size:14px}
  .tr-amt{font-size:16px}
  .tr-badge{display:inline-block}
}

/* inline change badges */
.ibadge{display:inline-flex;align-items:center;gap:3px;font-family:'Rajdhani',sans-serif;font-size:9px;font-weight:700;padding:2px 6px;border-radius:var(--r2);margin-left:4px}
.ibadge.up{background:rgba(46,204,143,.12);color:var(--green);border:1px solid rgba(46,204,143,.3)}
.ibadge.dn{background:rgba(240,81,126,.1);color:var(--red);border:1px solid rgba(240,81,126,.3)}

/* ═══════════ TIER CHANGE SECTION ═══════════ */
.tc-head-up{padding:7px 12px;background:rgba(46,204,143,.06);border-bottom:1px solid rgba(46,204,143,.12);border-top:1px solid var(--border2);font-family:'Rajdhani',sans-serif;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--green)}
.tc-head-dn{padding:7px 12px;background:rgba(240,81,126,.06);border-bottom:1px solid rgba(240,81,126,.12);border-top:1px solid var(--border2);font-family:'Rajdhani',sans-serif;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--red)}
.tch-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border-bottom:1px solid var(--border2)}
.tch-row:active{background:rgba(45,212,245,.05)}
.tch-arr{font-size:16px;width:22px;text-align:center;flex-shrink:0}
.tch-info{flex:1;min-width:0}
.tch-name{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tch-tiers{font-size:11px;color:var(--text3);margin-top:2px;display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.tch-right{text-align:right;flex-shrink:0}
.tch-amt{font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700}
.tch-prev{font-size:10px;color:var(--text3);margin-top:2px}
.no-chg{padding:16px;text-align:center;font-size:12px;color:var(--text3)}

/* ═══════════ PARTNERS LIST ═══════════ */
.search-wrap{position:relative;margin-bottom:10px}
.search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:15px;height:15px;stroke:var(--text3);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;pointer-events:none}
.search-inp{
  width:100%;padding:12px 14px 12px 36px;
  background:var(--panel);border:1px solid var(--border);border-radius:var(--r);
  font-size:15px;font-family:'Inter',sans-serif;color:var(--text);outline:none;
}
.search-inp:focus{border-color:var(--cyan)}
.search-inp::placeholder{color:var(--text3)}

.plist{background:var(--panel);border-radius:var(--r);border:1px solid var(--border);overflow:hidden}
.pl-item{
  display:flex;align-items:center;gap:10px;padding:11px 12px;
  border-bottom:1px solid var(--border2);
}
.pl-item:last-child{border-bottom:none}
.pl-item:active{background:rgba(45,212,245,.05)}
.pl-av{
  width:34px;height:34px;border-radius:var(--r2);display:flex;align-items:center;justify-content:center;
  font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:700;flex-shrink:0;
  border:1px solid;
}
.pl-info{flex:1;min-width:0}
.pl-name{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pl-loc{font-size:11px;color:var(--text3);margin-top:1px}
.pl-right{text-align:right;flex-shrink:0}
.pl-amt{font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:700;color:var(--cyan)}
.pl-tier{font-family:'Rajdhani',sans-serif;font-size:10px;font-weight:600;padding:2px 7px;border-radius:var(--r2);margin-top:3px;display:inline-block}

/* ═══════════ DETAIL HERO ═══════════ */
.det-panel{
  background:var(--panel);border-radius:var(--r);border:1px solid var(--border);
  border-left-width:3px;margin-bottom:10px;overflow:hidden;
}
.det-top-bar{padding:14px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border2)}
.det-avatar{
  width:44px;height:44px;border-radius:var(--r2);display:flex;align-items:center;justify-content:center;
  font-family:'Rajdhani',sans-serif;font-size:17px;font-weight:700;flex-shrink:0;
  border:1.5px solid;
}
.det-name{font-family:'Rajdhani',sans-serif;font-size:17px;font-weight:700;line-height:1.15;margin-bottom:5px;word-break:break-word}
.det-pills-row{display:flex;flex-wrap:wrap;align-items:center;gap:5px}
.det-tier-pill{font-family:'Rajdhani',sans-serif;font-size:10px;font-weight:700;text-transform:uppercase;padding:3px 10px;border-radius:var(--r2);display:inline-flex;align-items:center;gap:4px}
.chg-pill{font-family:'Rajdhani',sans-serif;font-size:10px;font-weight:700;padding:3px 9px;border-radius:var(--r2);border:1px solid;display:inline-flex;align-items:center;gap:4px}
.chg-pill.up{background:rgba(46,204,143,.1);color:var(--green);border-color:rgba(46,204,143,.3)}
.chg-pill.dn{background:rgba(240,81,126,.1);color:var(--red);border-color:rgba(240,81,126,.3)}

.chg-banner{display:flex;align-items:center;gap:12px;margin:0 14px 14px;padding:11px 13px;border-radius:var(--r2);border:1px solid}
.chg-banner.up{background:rgba(46,204,143,.06);border-color:rgba(46,204,143,.25)}
.chg-banner.dn{background:rgba(240,81,126,.06);border-color:rgba(240,81,126,.25)}
.chg-banner-icon{font-size:24px;flex-shrink:0}
.chg-banner-lbl{font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;margin-bottom:3px}
.chg-banner-lbl.up{color:var(--green)}
.chg-banner-lbl.dn{color:var(--red)}
.chg-banner-tiers{font-size:12px;color:var(--text2);display:flex;align-items:center;gap:6px;flex-wrap:wrap}

.info-grid{display:grid;grid-template-columns:1fr;gap:7px;padding:0 14px 14px}
.inf{background:var(--panel2);border-radius:var(--r2);padding:10px 12px;border:1px solid var(--border2)}
.inf-lbl{font-family:'Rajdhani',sans-serif;font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-bottom:4px}
.inf-val{font-size:13px;font-weight:600;color:var(--text);word-break:break-word}
.inf-val.mono{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--cyan2)}
.s2{grid-column:1/-1}
.cbtns{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
.cbtn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:20px;font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:700;border:1px solid;min-height:38px}
.cbtn-call{background:rgba(45,212,245,.1);color:var(--cyan);border-color:rgba(45,212,245,.3)}
.cbtn-wa{background:rgba(46,204,143,.1);color:var(--green);border-color:rgba(46,204,143,.3)}

.stats-strip{display:grid;grid-template-columns:1fr 1fr;gap:7px;padding:0 14px 14px}
.st{background:var(--panel2);border-radius:var(--r2);padding:10px 8px;text-align:center;border:1px solid var(--border2)}
.st-num{font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:700;line-height:1;margin-bottom:4px}
.st-lbl{font-family:'Rajdhani',sans-serif;font-size:9px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--text3)}
.st-diff{font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;margin-top:4px}
@media(min-width:560px){
  .info-grid{grid-template-columns:1fr 1fr}
  .stats-strip{grid-template-columns:repeat(3,1fr)}
}

/* ═══════════ QUEST CARD ═══════════ */
.quest-panel{background:var(--panel);border-radius:var(--r);border:1px solid var(--border);overflow:hidden;margin-bottom:10px}
.qhd{display:flex;flex-direction:column}
.qhd-left{
  padding:12px 14px;
  background:rgba(245,180,61,.06);
  border-bottom:1px solid rgba(245,180,61,.14);
  display:flex;align-items:center;gap:10px;
}
.qhd-icon{font-size:22px;line-height:1}
.qhd-ttl{font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--amber)}
.qhd-sub{font-size:11px;color:var(--text3);margin-top:2px}
.qhd-right{padding:12px 14px;display:flex;align-items:center;gap:14px;background:rgba(245,180,61,.03)}
.qring-wrap{position:relative;width:48px;height:48px;flex-shrink:0}
.qring-wrap svg{transform:rotate(-90deg)}
.qring-val{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:700;color:var(--amber)}
.qscore-num{font-family:'Rajdhani',sans-serif;font-size:22px;font-weight:700;color:var(--amber);line-height:1}
.qscore-lbl{font-family:'Rajdhani',sans-serif;font-size:9px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text3);margin-top:3px}
.qi{display:flex;align-items:center;gap:11px;padding:12px;border-bottom:1px solid var(--border2)}
.qi:last-child{border-bottom:none}
.qi-pill{
  width:38px;height:38px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:17px;
  border:1px solid;
}
.qi-body{flex:1;min-width:0}
.qi-name{font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;color:var(--text);margin-bottom:2px}
.qi-desc{font-size:10px;color:var(--text3);margin-bottom:6px}
.xp-track{height:6px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden;margin-bottom:4px}
.xp-fill{height:100%;border-radius:3px;transition:width .5s ease}
.xp-row{display:flex;justify-content:space-between;align-items:center}
.xp-prog{font-family:'Share Tech Mono',monospace;font-size:10px;font-weight:600}
.xp-tip{font-size:10px;color:var(--text3)}
.q-stat{display:flex;flex-direction:column;align-items:center;gap:4px;flex-shrink:0;min-width:38px}
.q-orb{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;border:2px solid;font-family:'Rajdhani',sans-serif}
.q-orb.done{background:rgba(46,204,143,.1);color:var(--green);border-color:rgba(46,204,143,.4)}

<script>
/* ═══════ CONSTANTS ═══════ */
const SID='1bjUIiD3xL8NWWzkZAatxvwp5n98yq7JVE5FODCbmvAs';
const CSV='https://docs.google.com/spreadsheets/d/'+SID+'/gviz/tq?tqx=out:csv&sheet=';

let customers=[],orders=[],receipts=[],allMonths=[];
let selMonth='All',navStack=['dashboard'];
/* AUTH — { role: 'admin'|'customer', custId: string|null }
   role='admin' sees all data unrestricted, same as before.
   role='customer' is scoped to a single custId everywhere: dashboard
   metrics, agents list, and detail page all filter down to just them. */
let AUTH=null;
const ADMIN_ID='admin', ADMIN_PW='admin';
const AUTH_STORAGE_KEY='aaradhya_rx_auth';
const MMAP={Jan:1,Feb:2,Mar:3,Apr:4,May:5,Jun:6,Jul:7,Aug:8,Sep:9,Oct:10,Nov:11,Dec:12};

/* ═══════ TIERS ═══════ */
const TIERS=[
  {name:'DIAMOND',full:'Diamond Partner',emoji:'💎',min:100000,color:'#38BDF8',glow:'rgba(56,189,248,.35)',bg:'rgba(56,189,248,.08)',border:'rgba(56,189,248,.3)',text:'#7DD3FC'},
  {name:'PLATINUM',full:'Platinum Partner',emoji:'🌟',min:70000,color:'#C084FC',glow:'rgba(192,132,252,.3)',bg:'rgba(192,132,252,.08)',border:'rgba(192,132,252,.3)',text:'#D8B4FE'},
  {name:'GOLD',full:'Gold Partner',emoji:'🥇',min:50000,color:'#FFB800',glow:'rgba(255,184,0,.35)',bg:'rgba(255,184,0,.08)',border:'rgba(255,184,0,.3)',text:'#FDE68A'},
  {name:'SILVER',full:'Silver Partner',emoji:'🥈',min:20000,color:'#94A3B8',glow:'rgba(148,163,184,.2)',bg:'rgba(148,163,184,.08)',border:'rgba(148,163,184,.25)',text:'#CBD5E1'},
  {name:'BRONZE',full:'Bronze Partner',emoji:'🥉',min:10000,color:'#FB923C',glow:'rgba(251,146,60,.3)',bg:'rgba(251,146,60,.08)',border:'rgba(251,146,60,.3)',text:'#FDBA74'},
];
const UNRANKED={name:'UNRANKED',full:'Unranked',emoji:'◦',min:0,color:'#3A5068',glow:'none',bg:'rgba(58,80,104,.08)',border:'rgba(58,80,104,.25)',text:'#64748B'};

function getTier(a){for(const t of TIERS)if(a>=t.min)return t;return UNRANKED;}
function tRank(t){const i=TIERS.findIndex(x=>x.name===t.name);return i===-1?-1:TIERS.length-1-i;}

/* ═══════ UTILS ═══════ */
function fmtINR(n){return '₹'+Math.round(n).toLocaleString('en-IN');}

/* ═══════════════════════════════════════════════════════════
   LIGHTWEIGHT SVG CHART ENGINE — no external libraries, themed
   to match the sci-fi HUD aesthetic. Three chart types:
     buildBarChart   — vertical bars (e.g. monthly revenue trend)
     buildLineChart  — line + glow + dot markers (e.g. dual trend)
     buildDonutChart — ring chart (e.g. tier distribution)
   All return a ready-to-insert HTML string containing an <svg>.
═══════════════════════════════════════════════════════════ */

/* Vertical bar chart. data: [{label, value, color?}]. */
function buildBarChart(data,opts={}){
  const W=opts.width||320,H=opts.height||140,pad={t:18,r:10,b:26,l:10};
  const innerW=W-pad.l-pad.r,innerH=H-pad.t-pad.b;
  const maxV=Math.max(1,...data.map(d=>d.value));
  const n=data.length||1;
  const gap=8,barW=Math.max(8,(innerW-gap*(n-1))/n);
  const defaultColor=opts.color||'var(--cyan)';
  let bars='',labels='';
  data.forEach((d,i)=>{
    const h=Math.max(2,(d.value/maxV)*innerH);
    const x=pad.l+i*(barW+gap);
    const y=pad.t+innerH-h;
    const color=d.color||defaultColor;
    bars+=`<rect x="${x}" y="${y}" width="${barW}" height="${h}" rx="3" fill="${color}" opacity="0.85">
      <title>${d.label}: ${opts.fmt?opts.fmt(d.value):d.value}</title>
    </rect>`;
    if(d.value>0){
      bars+=`<text x="${x+barW/2}" y="${y-5}" text-anchor="middle" font-size="9" font-family="Share Tech Mono, monospace" fill="${color}">${opts.barLabelFmt?opts.barLabelFmt(d.value):''}</text>`;
    }
    labels+=`<text x="${x+barW/2}" y="${H-8}" text-anchor="middle" font-size="9" font-family="Rajdhani, sans-serif" font-weight="600" fill="var(--text3)" letter-spacing="0.3">${d.label}</text>`;
  });
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;display:block" preserveAspectRatio="xMidYMid meet">
    <line x1="${pad.l}" y1="${pad.t+innerH}" x2="${W-pad.r}" y2="${pad.t+innerH}" stroke="var(--border2)" stroke-width="1"/>
    ${bars}${labels}
  </svg>`;
}

/* Line chart with optional second series, glow stroke, and dot markers.
   series: [{label, points:[{x,y}], color}] where x/y are already 0..1 normalised
   is NOT required — pass raw values; this function does the scaling.
   data: [{label, value}] for single-series, OR pass `series` array directly
   for multi-series: opts.series = [{name,color,values:[...]}], opts.labels=[...] */
function buildLineChart(opts){
  const W=opts.width||320,H=opts.height||150,pad={t:20,r:14,b:24,l:14};
  const innerW=W-pad.l-pad.r,innerH=H-pad.t-pad.b;
  const labels=opts.labels||[];
  const series=opts.series||[];
  const allVals=series.flatMap(s=>s.values);
  const maxV=Math.max(1,...allVals);
  const n=labels.length||1;
  const stepX=n>1?innerW/(n-1):0;
  const xAt=i=>pad.l+(n>1?i*stepX:innerW/2);
  const yAt=v=>pad.t+innerH-(v/maxV)*innerH;

  /* gridlines */
  let grid='';
  for(let g=0;g<=2;g++){
    const gy=pad.t+innerH*(g/2);
    grid+=`<line x1="${pad.l}" y1="${gy}" x2="${W-pad.r}" y2="${gy}" stroke="var(--border2)" stroke-width="1"/>`;
  }

  let paths='';
  series.forEach((s,si)=>{
    const pts=s.values.map((v,i)=>`${xAt(i)},${yAt(v)}`).join(' ');
    const areaPath=`M${xAt(0)},${pad.t+innerH} L${pts.split(' ').join(' L')} L${xAt(n-1)},${pad.t+innerH} Z`;
    paths+=`<path d="${areaPath}" fill="${s.color}" opacity="0.07"/>`;
    paths+=`<polyline points="${pts}" fill="none" stroke="${s.color}" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round" style="filter:drop-shadow(0 0 4px ${s.color}80)"/>`;
    s.values.forEach((v,i)=>{
      paths+=`<circle cx="${xAt(i)}" cy="${yAt(v)}" r="3.5" fill="${s.color}" stroke="var(--bg)" stroke-width="1.5">
        <title>${s.name} — ${labels[i]}: ${opts.fmt?opts.fmt(v):v}</title>
      </circle>`;
    });
  });

  const labelEls=labels.map((l,i)=>`<text x="${xAt(i)}" y="${H-6}" text-anchor="middle" font-size="9" font-family="Rajdhani, sans-serif" font-weight="600" fill="var(--text3)" letter-spacing="0.3">${l}</text>`).join('');

  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;display:block" preserveAspectRatio="xMidYMid meet">
    ${grid}${paths}${labelEls}
  </svg>`;
}

/* Donut/ring chart. data: [{label, value, color}]. Returns SVG + an inline legend. */
function buildDonutChart(data,opts={}){
  const size=opts.size||130,stroke=opts.stroke||16;
  const r=(size-stroke)/2,cx=size/2,cy=size/2,circumference=2*Math.PI*r;
  const total=data.reduce((s,d)=>s+d.value,0)||1;
  let offset=0,arcs='';
  data.forEach(d=>{
    const frac=d.value/total;
    const len=frac*circumference;
    arcs+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${d.color}"
      stroke-width="${stroke}" stroke-dasharray="${len} ${circumference-len}"
      stroke-dashoffset="${-offset}" transform="rotate(-90 ${cx} ${cy})" stroke-linecap="butt">
      <title>${d.label}: ${d.value}</title>
    </circle>`;
    offset+=len;
  });
  const centerLbl=opts.centerLabel||'';
  const centerVal=opts.centerValue||total;

/* ═══════════════════════════════════════════════════════════
   CANONICAL DATE ENGINE — single source of truth for all dates.
   Every order/receipt row gets its date parsed ONCE at load time
   into a real Date object (record._d). Every other date need in
   the app (display, sorting, month derivation, predictions) reads
   from that cached Date — nothing re-parses the raw string later.
   This guarantees display, sort order, and month grouping can
   never disagree with each other.
═══════════════════════════════════════════════════════════ */
const MON_NAMES=['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const MON_NAMES_LC=MON_NAMES.map(m=>m.toLowerCase());

/* Parse a date string in one of these shapes:
     dd-mm-yyyy, dd-mm-yy, dd-mon-yyyy, dd-mon-yy   (hyphen or dot separator,
       day ALWAYS first — this is the format used when a sheet cell holds
       literal text, exactly as specified)
     m/d/yyyy                                        (slash separator — this
       is what Google's gviz CSV export produces for a cell that is a TRUE
       Date-typed cell rather than text, regardless of the sheet's display
       format; gviz always serialises real dates as US month/day/year)
   Returns a real Date object, or null if the string matches none of these
   shapes. No fuzzy guessing — an unrecognised shape returns null so it can
   be caught by the health-check warnings rather than silently misread. */
function parseDateSmart(raw){
  if(raw===null||raw===undefined)return null;
  /* Strip: leading apostrophe (Sheets' "force text" marker), all whitespace
     variants including non-breaking space (\u00A0), zero-width characters,
     and BOM — any of which could make an otherwise-valid string silently
     fail every regex below without looking visibly different. */
  let d=String(raw)
    .replace(/^[\uFEFF\u200B]+/,'')
    .replace(/[\u00A0\s]+/g,' ')
    .trim()
    .replace(/^'/,'');
  if(!d||d==='—'||d.toLowerCase()==='undefined'||d.toLowerCase()==='null')return null;

  /* Google Sheets gviz CSV export occasionally serialises a Date-typed cell
     as the literal text "Date(2026,3,13)" — year, 0-indexed month, day. */
  const gviz=d.match(/^Date\((\d{4}),(\d{1,2}),(\d{1,2})\)$/);
  if(gviz)return new Date(parseInt(gviz[1]),parseInt(gviz[2]),parseInt(gviz[3]));

  /* SLASH separator → gviz's export of a true Date-typed cell, always
     m/d/yyyy (US order) regardless of the sheet's locale or display format. */
  const slashMatch=d.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2}|\d{4})$/);
  if(slashMatch){
    const mi=parseInt(slashMatch[1]),day=parseInt(slashMatch[2]);
    const yrPart=slashMatch[3];
    const year=yrPart.length===2?2000+parseInt(yrPart):parseInt(yrPart);
    if(mi<1||mi>12||day<1||day>31)return null;
    const result=new Date(year,mi-1,day);
    if(result.getDate()!==day||result.getMonth()!==mi-1||result.getFullYear()!==year)return null;
    return result;
  }

  /* HYPHEN or DOT separator → literal text in dd-mm-yyyy / dd-mm-yy /
     dd-mon-yyyy / dd-mon-yy format, day always first, per spec. */
  const norm=d.replace(/\./g,'-').trim();
  const m=norm.match(/^(\d{1,2})-([A-Za-z]{3,}|\d{1,2})-(\d{2}|\d{4})$/);
  if(!m)return null;

  const day=parseInt(m[1]);
  const yrPart=m[3];
  const year=yrPart.length===2?2000+parseInt(yrPart):parseInt(yrPart);
  if(isNaN(day)||day<1||day>31)return null;

  let monthIdx; /* 0-indexed for Date() constructor */
  if(/^\d+$/.test(m[2])){
    /* dd-mm-yyyy / dd-mm-yy */
    const mi=parseInt(m[2]);
    if(mi<1||mi>12)return null;
    monthIdx=mi-1;
  }else{
    /* dd-mon-yyyy / dd-mon-yy */
    const idx=MON_NAMES_LC.indexOf(m[2].toLowerCase().slice(0,3));
    if(idx<=0)return null; /* MON_NAMES_LC[0] is '' (unused), so <=0 means no match */
    monthIdx=idx-1; /* MON_NAMES_LC is 1-indexed (index 0 is blank) */
  }

  const result=new Date(year,monthIdx,day);
  /* Guard against JS Date's auto-rollover (e.g. day=31 in a 30-day month
     silently becoming the 1st of next month) — treat that as invalid. */
  if(result.getDate()!==day||result.getMonth()!==monthIdx||result.getFullYear()!==year)return null;
  return result;
}

/* Display formatter — takes the CACHED Date object (never re-parses a string).
   Returns "—" for missing/invalid dates, else "13-Apr-2026" (dd-mon-yyyy,
   hyphen-separated, matching the format requested for display). */
function fmtDateObj(dt){
  if(!dt||isNaN(dt.getTime()))return '—';
  return `${String(dt.getDate()).padStart(2,'0')}-${MON_NAMES[dt.getMonth()+1]}-${dt.getFullYear()}`;
}

/* Sort-key helper — takes the cached Date object, returns epoch ms (0 if null).
   Used directly as a comparator value: array.sort((a,b)=>dateKey(b._d)-dateKey(a._d)) */
function dateKey(dt){return dt&&!isNaN(dt.getTime())?dt.getTime():0;}

/* Derive "Mon-YYYY" month bucket directly from a cached Date object —
   guaranteed to match whatever date was actually parsed and displayed. */
function monthFromDateObj(dt){
  if(!dt||isNaN(dt.getTime()))return '';
  return MON_NAMES[dt.getMonth()+1]+'-'+dt.getFullYear();
}

/* ═══════════ PREDICTION ENGINE ═══════════
   Computes average gap between consecutive orders/receipts for a customer,
   then projects the next likely order/payment date from the most recent one.
   Operates entirely on cached Date objects — no re-parsing. */
function computeCadence(dateObjList){
  const valid=dateObjList.filter(d=>d&&!isNaN(d.getTime()));
  if(valid.length<2) return {avgDays:null,lastDate:valid.length===1?valid[0]:null,nextDate:null,sampleSize:valid.length};
  const sorted=valid.slice().sort((a,b)=>a-b); /* oldest → newest */
  const gaps=[];
  for(let i=1;i<sorted.length;i++){
    const gapDays=Math.round((sorted[i]-sorted[i-1])/(1000*60*60*24));
    if(gapDays>0) gaps.push(gapDays); /* ignore same-day duplicate entries */
  }
  if(!gaps.length) return {avgDays:null,lastDate:sorted[sorted.length-1],nextDate:null,sampleSize:valid.length};
  const avgDays=Math.round(gaps.reduce((s,g)=>s+g,0)/gaps.length);
  const lastDate=sorted[sorted.length-1];
  const nextDate=new Date(lastDate.getTime()+avgDays*24*60*60*1000);
  return {avgDays,lastDate,nextDate,sampleSize:valid.length};
}

/* Days from today until a predicted date — negative means overdue */
function daysFromToday(d){
  if(!d||isNaN(d.getTime()))return null;
  const today=new Date(); today.setHours(0,0,0,0);
  const target=new Date(d); target.setHours(0,0,0,0);
  return Math.round((target-today)/(1000*60*60*24));
}

function buildPredictCell(icon,label,cad,color){
  if(cad.sampleSize<2||!cad.nextDate){
    const reason=cad.sampleSize===0?'NO HISTORY ON RECORD':cad.sampleSize===1?'NEED 2+ RECORDS TO PREDICT':'IRREGULAR PATTERN — CANNOT PREDICT';
    return `<div class="predict-cell">
      <div class="predict-cell-hd"><span class="predict-icon">${icon}</span><span class="predict-label">${label}</span></div>
      <div style="color:var(--text3);font-size:13px;padding:8px 0">[ ${reason} ]</div>
      ${cad.lastDate?`<div class="predict-sub">Last: ${fmtDateObj(cad.lastDate)}</div>`:''}
    </div>`;
  }
  const daysOut=daysFromToday(cad.nextDate);
  let cdClass='normal',cdText=`IN ${daysOut} DAYS`;
  if(daysOut<0){cdClass='overdue';cdText=`${Math.abs(daysOut)} DAYS OVERDUE`;}
  else if(daysOut<=2){cdClass='soon';cdText=daysOut===0?'DUE TODAY':`DUE IN ${daysOut} DAY${daysOut>1?'S':''}`;}
  return `<div class="predict-cell">
    <div class="predict-cell-hd"><span class="predict-icon">${icon}</span><span class="predict-label">${label}</span></div>
    <div class="predict-date" style="color:${color};text-shadow:0 0 10px ${color}40">${fmtDateObj(cad.nextDate)}</div>
    <div class="predict-sub">Based on ${cad.sampleSize} records · avg ${cad.avgDays}-day cycle</div>
    <div class="predict-countdown ${cdClass}">${cdClass==='overdue'?'⚠':'⏱'} ${cdText}</div>
    <div class="cadence-stat">LAST: ${fmtDateObj(cad.lastDate)}</div>
  </div>`;
}
function moVal(m){
  /* handles both "Apr-2026" and "Apr-26" */
  const p=m.split('-');
  const yr=parseInt(p[1]||0);
  const fullYr=yr<100?2000+yr:yr;
  return fullYr*12+(MMAP[p[0]]||0);
}
function ini(name){return (name||'').split(/\s+/).map(w=>w[0]||'').join('').slice(0,2).toUpperCase()||'?';}

/* Normalise month strings to "Mon-YYYY" format (e.g. "Apr-2026", "Apr-26" → "Apr-2026").
   Used only as a fallback when a sheet's pre-computed month column has a value
   but a Date object isn't being used to derive the bucket. */
function normMonth(s){
  if(!s)return '';
  s=s.trim();
  if(/^[A-Za-z]{3}-\d{4}$/.test(s))return s;
  const m=s.match(/^([A-Za-z]{3})-(\d{2})$/);
  if(m)return m[1]+'-20'+m[2];
  return s;
}

/* ── Receipt aggregation ── */
function rcptTotalsFrom(rcpts){
  const t={};
  rcpts.forEach(r=>{
    if(!r.custId||r.custId.toLowerCase()==='unknown')return;
    t[r.custId]=(t[r.custId]||0)+r.amount;
  });
  return t;
}
function filtRcpt(){return selMonth==='All'?receipts:receipts.filter(r=>r.month===selMonth);}
function outstandingFor(custId){
  const cust=customers.find(c=>c.id===custId);
  const initOut=(cust&&cust.initOutstanding)||0;
  const totalOrders=orders.filter(o=>o.custId===custId).reduce((s,o)=>s+o.amount,0);
  const totalCollected=receipts.filter(r=>r.custId===custId).reduce((s,r)=>s+r.amount,0);
  return Math.max(0, initOut + totalOrders - totalCollected);
}

/* ═══════ CSV ═══════ */
function parseCSV(txt){
  const rows=[];let cur='',inQ=false,row=[];
  for(let i=0;i<txt.length;i++){
    const c=txt[i];
    if(c==='"'){if(inQ&&txt[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}
    else if(c===','&&!inQ){row.push(cur.trim());cur='';}
    else if((c==='\n'||c==='\r')&&!inQ){
      if(c==='\r'&&txt[i+1]==='\n')i++;
      row.push(cur.trim());cur='';
      if(row.some(x=>x!==''))rows.push(row);row=[];
    }else cur+=c;
  }
  if(row.length){row.push(cur.trim());if(row.some(x=>x!==''))rows.push(row);}
  return rows;
}
async function fetchSheet(name){
  /* Cache-bust: Google's CSV export endpoint and some browsers can serve a
     stale cached response, especially right after switching to a different
     sheet ID. Appending a changing param forces a fresh fetch every load. */
  const r=await fetch(CSV+encodeURIComponent(name)+'&_t='+Date.now(),{cache:'no-store'});
  if(!r.ok)throw new Error('Cannot read "'+name+'"');
  return parseCSV(await r.text());
}

/* Find a column index by matching header text against candidate keywords.
   Immune to column reordering, header renames, or extra/missing columns.
   Matches case/whitespace/punctuation-insensitively. Prefers an EXACT
   normalised match first (avoids e.g. "OrderDate" wrongly matching a
   "Date" candidate meant for a different column), then falls back to
   substring containment. */
function findCol(headerRow,...candidates){
  const norm=s=>(s||'').toLowerCase().replace(/[^a-z0-9]/g,'');
  const normHeaders=headerRow.map(norm);
  /* pass 1: exact match */
  for(const cand of candidates){
    const cN=norm(cand);
    const idx=normHeaders.findIndex(h=>h===cN);
    if(idx!==-1)return idx;
  }
  /* pass 2: substring containment (header contains candidate) */
  for(const cand of candidates){
    const cN=norm(cand);
    const idx=normHeaders.findIndex(h=>h.includes(cN));
    if(idx!==-1)return idx;
  }
  return -1;
}

/* ═══════ AUTH ═══════ */
function normMobile(s){return (s||'').replace(/\D/g,'').slice(-10);} /* last 10 digits, strips +91/spaces/dashes */

function handleLogin(ev){
  ev.preventDefault();
  const idRaw=document.getElementById('login-id').value.trim();
  const pwRaw=document.getElementById('login-pw').value.trim();
  const errEl=document.getElementById('login-err');
  errEl.style.display='none';

  /* Admin login: fixed credentials, sees everything */
  if(idRaw.toLowerCase()===ADMIN_ID&&pwRaw===ADMIN_PW){
    AUTH={role:'admin',custId:null};
    sessionStorage.setItem(AUTH_STORAGE_KEY,JSON.stringify(AUTH));
    enterApp();
    return false;
  }

  /* Customer login: Login ID = Customer ID (case-insensitive exact match),
     Password = registered mobile number (matched on last 10 digits, so
     "+91 93375 53491", "9337553491", "93375-53491" all work the same). */
  const cust=customers.find(c=>(c.id||'').toLowerCase()===idRaw.toLowerCase());
  if(cust&&cust.mobile&&normMobile(cust.mobile)===normMobile(pwRaw)&&normMobile(pwRaw).length===10){
    AUTH={role:'customer',custId:cust.id};
    sessionStorage.setItem(AUTH_STORAGE_KEY,JSON.stringify(AUTH));
    enterApp();
    return false;
  }

  errEl.style.display='block';
  errEl.textContent='Invalid Login ID or password. Customers: use your Customer ID and registered mobile number.';
  return false;
}

function handleLogout(){
  AUTH=null;
  sessionStorage.removeItem(AUTH_STORAGE_KEY);
  document.getElementById('app-root').style.display='none';
  document.getElementById('login-scr').style.display='flex';
  document.getElementById('login-form').reset();
  document.getElementById('login-err').style.display='none';
}

function enterApp(){
  document.getElementById('login-scr').style.display='none';
  document.getElementById('app-root').style.display='block';

  /* Customers don't get the Agents directory (it would just show themselves)
     — they land straight on their own profile instead. */
  document.getElementById('tab-agents-btn').style.display=AUTH.role==='customer'?'none':'inline-block';

  if(AUTH.role==='customer'){
    navStack=['detail'];
    showDetailById(AUTH.custId);
    document.getElementById('main-tabs').style.display='none';
    document.getElementById('nav-home').style.display='none';
    document.getElementById('nav-back').style.display='none';
    document.getElementById('mob-nav').style.display='none';
  }else{
    navStack=['dashboard'];
    showPage('dashboard');
    syncMobNav('dashboard');
  }
}

/* On a hard refresh, customers MUST log in again before any sheet data is
   fetched — we can't validate a stored customer session without the
   customer list loaded first. So: load data silently in the background,
   then check the stored session against it, then either auto-enter or show
   the login screen. Admin sessions don't need customer data to validate, so
   they can enter immediately while data loads behind the scenes. */
async function bootApp(){
  const stored=sessionStorage.getItem(AUTH_STORAGE_KEY);
  let pending=null;
  if(stored){
    try{pending=JSON.parse(stored);}catch(e){pending=null;}
  }

  if(pending&&pending.role==='admin'){
    AUTH=pending;
    enterApp();
    await loadData();
    return;
  }

  /* Either no stored session, or a customer session that needs the
     customer list loaded first to verify the custId still exists.
     AUTH is still null at this point, so loadData() itself won't render
     anything — we decide what to show once data + session are both known. */
  await loadData();

  if(pending&&pending.role==='customer'&&customers.find(c=>c.id===pending.custId)){
    AUTH=pending;
    enterApp();
  }
  /* else: stay on the login screen (already visible by default) */
}

/* ═══════ LOAD ═══════ */
async function loadData(){

    const cH=cr[0]||[];
    const cIdId=findCol(cH,'customerid','custid'); const cIdIdx=cIdId!==-1?cIdId:0;
    const cIdName=findCol(cH,'businessname','partnername'); const cIdNameIdx=cIdName!==-1?cIdName:1;
    const cIdOwner=findCol(cH,'ownername'); const cIdOwnerIdx=cIdOwner!==-1?cIdOwner:2;
    const cIdMobile=findCol(cH,'mobile','whatsapp','phone'); const cIdMobileIdx=cIdMobile!==-1?cIdMobile:3;
    const cIdOut=findCol(cH,'outstanding'); const cIdOutIdx=cIdOut!==-1?cIdOut:4;
    const cIdAddr=findCol(cH,'address'); const cIdAddrIdx=cIdAddr!==-1?cIdAddr:5;
    const cIdCity=findCol(cH,'city'); const cIdCityIdx=cIdCity!==-1?cIdCity:6;
    const cIdDist=findCol(cH,'district'); const cIdDistIdx=cIdDist!==-1?cIdDist:7;
    const cIdLic=findCol(cH,'druglicense','license','licence'); const cIdLicIdx=cIdLic!==-1?cIdLic:9;

    customers=[];
    for(let i=1;i<cr.length;i++){
      const r=cr[i];if(!r[cIdIdx]||!r[cIdNameIdx])continue;
      const initOut=parseFloat((r[cIdOutIdx]||'').replace(/[₹,\s]/g,''))||0;
      customers.push({
        id:r[cIdIdx],name:r[cIdNameIdx],owner:r[cIdOwnerIdx]||'',mobile:r[cIdMobileIdx]||'',

        district:r[cIdDistIdx]||'',license:r[cIdLicIdx]||''

    /* ── 2_ORDERS: resolve columns by header, fallback to known index ── */

    const oIdCust=findCol(oH,'customerid','custid'); const oIdCustIdx=oIdCust!==-1?oIdCust:1;
    const oIdBiz=findCol(oH,'businessname'); const oIdBizIdx=oIdBiz!==-1?oIdBiz:2;
    const oIdDate=findCol(oH,'orderdate','date','transactiondate'); const oIdDateIdx=oIdDate!==-1?oIdDate:3;
    const oIdMonth=findCol(oH,'ordermonth','month'); const oIdMonthIdx=oIdMonth!==-1?oIdMonth:4;
    const oIdNet=findCol(oH,'netamount'); const oIdGross=findCol(oH,'grossamount');

    orders=[];

      const rawAmt=(r[oIdAmtIdx]||r[6]||'').replace(/[₹,\s]/g,'');

      const dObj=parseDateSmart(dateVal);
      const sheetMonth=(r[oIdMonthIdx]||'').trim();
      /* Prefer the sheet's own month column when present; else derive from the parsed date */
      const month=normMonth(sheetMonth)||monthFromDateObj(dObj);
      orders.push({id:r[oIdOrderIdx],custId:r[oIdCustIdx]||'',bizName:r[oIdBizIdx]||'',date:dateVal,_d:dObj,month,amount:amt});

    const rIdDate=findCol(rH,'rcptdate','receiptdate','date'); const rIdDateIdx=rIdDate!==-1?rIdDate:2;

    }

    document.getElementById('data-status').textContent='FEED LIVE · '+customers.length+' AGENTS · '+orders.length+' ORDERS · '+receipts.length+' RECEIPTS';

    /* Only build the admin-wide dashboard/agents views once an admin is

    if(AUTH&&AUTH.role==='admin'){
      buildPills();renderDash();buildBizList();
      showPage('dashboard');
    }else if(AUTH&&AUTH.role==='customer'){
      showDetailById(AUTH.custId);
    }
  }catch(e){
    document.getElementById('loading-scr').style.display='none';
    const el=document.getElementById('err-bar');
    el.style.display='block';
    el.innerHTML='<strong>[ERROR]</strong> '+e.message+' — Ensure sheet is public (Anyone with the link → Viewer).';
  }
}

/* ═══════ PILLS ═══════ */
function buildPills(){
  const c=document.getElementById('period-pills');c.innerHTML='';
  ['All',...allMonths].forEach(m=>{
    const b=document.createElement('button');
    b.className='pill'+(m===selMonth?' on':'');
    b.textContent=m==='All'?'ALL TIME':m;
    b.onclick=()=>{selMonth=m;buildPills();renderDash();};
    c.appendChild(b);
  });
}

/* ═══════ AGGREGATION ═══════ */
function filtOrd(){return selMonth==='All'?orders:orders.filter(o=>o.month===selMonth);}
function totalsFrom(ords){
  const t={};
  ords.forEach(o=>{if(!o.custId||o.custId.toLowerCase()==='unknown')return;t[o.custId]=(t[o.custId]||0)+o.amount;});
  return t;
}
function nameMap(ords){const m={};ords.forEach(o=>{if(o.custId&&o.bizName)m[o.custId]=o.bizName;});return m;}
function buildChgMap(curMo,prevMo){
  const cm=curMo?totalsFrom(orders.filter(o=>o.month===curMo)):{};
  const pm=prevMo?totalsFrom(orders.filter(o=>o.month===prevMo)):{};
  const map={};
  [...new Set([...Object.keys(cm),...Object.keys(pm)])].forEach(id=>{
    const ca=cm[id]||0,pa=pm[id]||0,ct=getTier(ca),pt=getTier(pa);
    if(tRank(ct)!==tRank(pt))map[id]={curAmt:ca,prevAmt:pa,curTier:ct,prevTier:pt,change:tRank(ct)>tRank(pt)?'up':'dn'};
  });
  return map;
}

/* ═══════ DASHBOARD ═══════ */
function renderDash(){
  const ords=filtOrd(),totals=totalsFrom(ords),ids=Object.keys(totals);
  const rev=ords.reduce((s,o)=>s+o.amount,0);
  const curMo=selMonth!=='All'?selMonth:(allMonths[0]||'');
  const prevMo=selMonth!=='All'?allMonths[allMonths.indexOf(selMonth)+1]||'':(allMonths[1]||'');
  const chgMap=buildChgMap(curMo,prevMo);

  /* receipts for selected period */
  const fRcpts=filtRcpt();
  const rcptTotal=fRcpts.reduce((s,r)=>s+r.amount,0);
  const rcptCount=fRcpts.length;
  /* outstanding = sum of (initOutstanding + orders - receipts) per customer */
  const allBilled=orders.reduce((s,o)=>s+o.amount,0);
  const allInitOut=customers.reduce((s,c)=>s+(c.initOutstanding||0),0);
  const allCollected=receipts.reduce((s,r)=>s+r.amount,0);
  const totalOutstanding=Math.max(0,allInitOut+allBilled-allCollected);
  const totalBase=allInitOut+allBilled;
  const collectionPct=totalBase>0?Math.min(100,Math.round(allCollected/totalBase*100)):0;

  /* metrics — 4 cards */
  document.getElementById('metrics-area').className='metrics-grid metrics-grid-4';
  document.getElementById('metrics-area').innerHTML=`
    <div class="mc hero">
      <div class="mc-ico">💊</div>
      <div class="mc-lbl">MISSION REVENUE</div>
      <div class="mc-val">${fmtINR(rev)}</div>
      <div class="mc-sub">${selMonth==='All'?'ALL CYCLES':selMonth} · ${ords.length} ORDERS</div>
    </div>
    <div class="mc">
      <div class="mc-ico">🎯</div>
      <div class="mc-lbl">ACTIVE AGENTS</div>
      <div class="mc-val" style="color:var(--cyan)">${ids.length}</div>
      <div class="mc-sub">with orders placed</div>
    </div>
    <div class="mc">
      <div class="mc-ico">💳</div>
      <div class="mc-lbl">COLLECTED</div>
      <div class="mc-val" style="color:var(--green)">${fmtINR(rcptTotal)}</div>
      <div class="mc-sub">${rcptCount} RECEIPTS · ${selMonth==='All'?'ALL TIME':selMonth}</div>
    </div>
    <div class="mc">
      <div class="mc-ico">⚠️</div>
      <div class="mc-lbl">OUTSTANDING</div>
      <div class="mc-val" style="color:${totalOutstanding>0?'var(--red)':'var(--green)'}">${fmtINR(totalOutstanding)}</div>
      <div class="mc-sub" style="color:${collectionPct>=80?'var(--green)':collectionPct>=50?'var(--amber)':'var(--red)'}">${collectionPct}% COLLECTED OVERALL</div>
    </div>`;

  /* tier grid */
  document.getElementById('tier-cycle-lbl').textContent=selMonth==='All'?'ALL TIME':selMonth;
  document.getElementById('tier-grid-area').innerHTML=TIERS.map(t=>{
    const nextMin=TIERS[TIERS.indexOf(t)-1]?.min||Infinity;
    const cnt=ids.filter(id=>totals[id]>=t.min&&totals[id]<nextMin).length;
    return `<div class="tc">
      <span class="tc-emoji">${t.emoji}</span>
      <div class="tc-nm" style="color:${t.color}">${t.name}</div>
      <div class="tc-ct" style="color:${t.text};text-shadow:0 0 12px ${t.color}40">${cnt}</div>
      <div class="tc-mn">≥ ${fmtINR(t.min)}</div>
    </div>`;
  }).join('');

  /* top 5 */
  const nm=nameMap(ords);
  const top5=ids.sort((a,b)=>totals[b]-totals[a]).slice(0,5);
  const medals=[
    {bg:'rgba(255,184,0,.15)',c:'#FFB800',border:'rgba(255,184,0,.4)',lbl:'01',glow:'0 0 8px rgba(255,184,0,.4)'},
    {bg:'rgba(148,163,184,.12)',c:'#94A3B8',border:'rgba(148,163,184,.3)',lbl:'02',glow:'none'},
    {bg:'rgba(251,146,60,.12)',c:'#FB923C',border:'rgba(251,146,60,.3)',lbl:'03',glow:'none'},
    {bg:'rgba(58,80,104,.2)',c:'#3A5068',border:'rgba(58,80,104,.3)',lbl:'04',glow:'none'},
    {bg:'rgba(58,80,104,.2)',c:'#3A5068',border:'rgba(58,80,104,.3)',lbl:'05',glow:'none'},
  ];
  document.getElementById('top-list-area').innerHTML=top5.length===0
    ?'<div class="empty-note">[ NO DATA FOR THIS CYCLE ]</div>'
    :top5.map((id,i)=>{
      const m=medals[i],tier=getTier(totals[id]),chg=chgMap[id];
      const badge=chg?`<span class="ibadge ${chg.change}">${chg.change==='up'?'▲':'▼'} ${chg.curTier.name}</span>`:'';
      /* per-partner collection info */
      const pBilled=orders.filter(o=>o.custId===id).reduce((s,o)=>s+o.amount,0);
      const pCollected=receipts.filter(r=>r.custId===id).reduce((s,r)=>s+r.amount,0);
      const pOut=Math.max(0,pBilled-pCollected);
      const outTag=pOut>0?`<span style="font-size:10px;color:var(--red);margin-left:6px">⚠ ${fmtINR(pOut)} DUE</span>`:'<span style="font-size:10px;color:var(--green);margin-left:6px">✓ CLEAR</span>';
      return `<div class="top-row" onclick="showDetailById('${id}')">

  renderTierChanges(chgMap,curMo,prevMo,nm);

  renderDashCharts(ids,totals);
}

/* ═══════ PROFILE-LEVEL ANALYTICS CHARTS ═══════ */
function buildProfileChartsHTML(custId,cOrds,cRcpts,initOut,aAmt,aCollected,outstanding){
  /* Per-month order vs receipt trend for this customer, last 6 known months */
  const trendMonths=allMonths.slice(0,6).slice().reverse();
  const ordByMonth=trendMonths.map(m=>cOrds.filter(o=>o.month===m).reduce((s,o)=>s+o.amount,0));
  const rcptByMonth=trendMonths.map(m=>cRcpts.filter(r=>r.month===m).reduce((s,r)=>s+r.amount,0));
  const trendLabels=trendMonths.map(m=>m.split('-')[0]);
  const hasTrendData=ordByMonth.some(v=>v>0)||rcptByMonth.some(v=>v>0);

  const trendChart=(trendMonths.length>=2&&hasTrendData)?buildLineChart({
    width:300,height:150,labels:trendLabels,
    series:[
      {name:'Ordered',color:'#00E5FF',values:ordByMonth},
      {name:'Collected',color:'#00FF88',values:rcptByMonth},
    ],
    fmt:fmtINR
  }):'<div class="empty-note">[ NOT ENOUGH ORDER HISTORY YET ]</div>';

  /* Payment status donut: Collected vs Outstanding share of total liability */
  const totalLiability=initOut+aAmt;
  const donutData=[
    {label:'Collected',value:aCollected,color:'#00FF88'},
    {label:'Outstanding',value:outstanding,color:'#FF2D78'},
  ];
  const collPctForDonut=totalLiability>0?Math.round(aCollected/totalLiability*100):0;
  const donut=buildDonutChart(donutData,{centerLabel:'PAID',centerValue:collPctForDonut+'%'});

  return `<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px" class="dash-chart-grid">
    <div class="panel">
      <div class="panel-hd">
        <div class="panel-title">◈ PURCHASE TREND</div>
        <div class="panel-tag">LAST ${trendMonths.length} CYCLES</div>
      </div>
      <div style="padding:14px 14px 6px">
        ${trendChart}
        ${(trendMonths.length>=2&&hasTrendData)?`
        <div style="display:flex;gap:16px;justify-content:center;padding-top:8px;border-top:1px solid var(--border2);margin-top:4px">
          <div style="display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text2)"><span style="width:10px;height:2px;background:#00E5FF;display:inline-block;box-shadow:0 0 6px #00E5FF"></span>Ordered</div>
          <div style="display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text2)"><span style="width:10px;height:2px;background:#00FF88;display:inline-block;box-shadow:0 0 6px #00FF88"></span>Collected</div>
        </div>`:''}
      </div>
    </div>
    <div class="panel">
      <div class="panel-hd"><div class="panel-title">◈ PAYMENT STATUS</div></div>
      <div style="display:flex;align-items:center;justify-content:center;gap:14px;padding:18px 12px;flex-wrap:wrap">
        ${donut.svg}
        <div style="min-width:110px">${donut.legend}</div>

}

/* ═══════ DASHBOARD ANALYTICS CHARTS ═══════ */
function renderDashCharts(ids,totals){
  const sec=document.getElementById('chart-section');

  /* Revenue + collections trend across the last 6 known months (oldest→newest) */
  const trendMonths=allMonths.slice(0,6).slice().reverse();
  const revByMonth=trendMonths.map(m=>orders.filter(o=>o.month===m).reduce((s,o)=>s+o.amount,0));
  const collByMonth=trendMonths.map(m=>receipts.filter(r=>r.month===m).reduce((s,r)=>s+r.amount,0));
  const trendLabels=trendMonths.map(m=>m.split('-')[0]);

  const trendChart=trendMonths.length>=2?buildLineChart({
    width:320,height:160,labels:trendLabels,
    series:[
      {name:'Revenue',color:'#00E5FF',values:revByMonth},
      {name:'Collected',color:'#00FF88',values:collByMonth},
    ],
    fmt:fmtINR
  }):'<div class="empty-note">[ NOT ENOUGH MONTHS OF DATA YET ]</div>';

  /* Tier distribution donut, using already-computed totals for the selected period */
  const donutData=TIERS.map(t=>{
    const nextMin=TIERS[TIERS.indexOf(t)-1]?.min||Infinity;
    const cnt=ids.filter(id=>totals[id]>=t.min&&totals[id]<nextMin).length;
    return {label:t.name,value:cnt,color:t.color};
  });
  const unrankedCnt=ids.filter(id=>totals[id]<TIERS[TIERS.length-1].min).length;
  if(unrankedCnt>0)donutData.push({label:'UNRANKED',value:unrankedCnt,color:UNRANKED.color});
  const donut=buildDonutChart(donutData,{centerLabel:'AGENTS',centerValue:ids.length});

  /* Top 6 agents bar chart for the selected period */
  const top6=ids.slice().sort((a,b)=>totals[b]-totals[a]).slice(0,6);
  const nm2=nameMap(orders);
  const barData=top6.map(id=>{
    const t=getTier(totals[id]);
    return {label:(nm2[id]||id).split(' ')[0].slice(0,8),value:totals[id],color:t.color};
  });
  const barChart=barData.length>0?buildBarChart(barData,{width:320,height:150,fmt:fmtINR,barLabelFmt:v=>'₹'+(v>=1000?(v/1000).toFixed(1)+'k':v)}):'<div class="empty-note">[ NO DATA ]</div>';

  sec.innerHTML=`
  <div class="panel" style="margin-bottom:14px">
    <div class="panel-hd">
      <div class="panel-title">◈ REVENUE TREND</div>
      <div class="panel-tag">LAST ${trendMonths.length} CYCLES</div>
    </div>
    <div style="padding:14px 16px 6px">
      ${trendChart}
      ${trendMonths.length>=2?`
      <div style="display:flex;gap:16px;justify-content:center;padding-top:8px;border-top:1px solid var(--border2);margin-top:4px">
        <div style="display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text2)"><span style="width:10px;height:2px;background:#00E5FF;display:inline-block;box-shadow:0 0 6px #00E5FF"></span>Revenue</div>
        <div style="display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text2)"><span style="width:10px;height:2px;background:#00FF88;display:inline-block;box-shadow:0 0 6px #00FF88"></span>Collected</div>
      </div>`:''}
    </div>
  </div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px" class="dash-chart-grid">
    <div class="panel">
      <div class="panel-hd"><div class="panel-title">◈ RANK SPLIT</div></div>
      <div style="display:flex;align-items:center;gap:14px;padding:16px">
        ${donut.svg}
        <div style="flex:1;min-width:0">${donut.legend}</div>
      </div>
    </div>
    <div class="panel">
      <div class="panel-hd"><div class="panel-title">◈ TOP 6 AGENTS</div></div>
      <div style="padding:14px 12px 6px">${barChart}</div>
    </div>
  </div>
  `;
}

function renderTierChanges(chgMap,curMo,prevMo,nm){
  const sec=document.getElementById('tc-section');
  if(!curMo||!prevMo){sec.innerHTML='';return;}
  const promoted=Object.entries(chgMap).filter(([,v])=>v.change==='up');
  const demoted=Object.entries(chgMap).filter(([,v])=>v.change==='dn');
  if(!promoted.length&&!demoted.length){
    sec.innerHTML=`<div class="panel"><div class="panel-hd"><div class="panel-title">◈ RANK SHIFTS</div><div class="panel-tag">${prevMo} → ${curMo}</div></div><div class="no-chg">[ NO RANK CHANGES THIS CYCLE ]</div></div>`;return;
  }
  const mkRow=(list,type)=>list.sort((a,b)=>b[1].curAmt-a[1].curAmt).map(([id,v])=>{
    const ac=type==='up'?'var(--green)':'var(--red)';
    return `<div class="tch-row" onclick="showDetailById('${id}')">
      <div class="tch-arr" style="color:${ac}">${type==='up'?'▲':'▼'}</div>
      <div class="tch-info">
        <div class="tch-name">${nm[id]||id}</div>
        <div class="tch-tiers">${v.prevTier.emoji}<span style="color:${v.prevTier.color}">${v.prevTier.full}</span><span style="color:var(--text3)">→</span><span style="color:${v.curTier.color};font-weight:700">${v.curTier.emoji} ${v.curTier.full}</span></div>
      </div>
      <div class="tch-right">
        <div class="tch-amt" style="color:${ac}">${fmtINR(v.curAmt)}</div>
        <div class="tch-prev">prev ${fmtINR(v.prevAmt)}</div>
      </div>
      <div class="tr-chev">›</div>
    </div>`;
  }).join('');
  const pc=promoted.length,dc=demoted.length;
  sec.innerHTML=`<div class="panel">
    <div class="panel-hd">
      <div class="panel-title">◈ RANK SHIFTS</div>
      <div style="display:flex;gap:7px">
        ${pc?`<span class="ibadge up">▲ ${pc} PROMOTED</span>`:''}
        ${dc?`<span class="ibadge dn">▼ ${dc} DEMOTED</span>`:''}
      </div>
    </div>
    <div style="padding:7px 18px;background:rgba(0,0,0,.2);border-bottom:1px solid var(--border2);font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--text3)">
      CYCLE COMPARISON: ${prevMo} ──── ${curMo}
    </div>
    ${pc?`<div class="tc-head-up">▲ RANK UP (${pc})</div>${mkRow(promoted,'up')}`:''}
    ${dc?`<div class="tc-head-dn">▼ RANK DOWN (${dc})</div>${mkRow(demoted,'dn')}`:''}
  </div>`;
}

  document.getElementById('plist-area').innerHTML=list.slice(0,200).map(c=>{
    const amt=t[c.id]||0,tier=getTier(amt),av=ini(c.name),ch=chg[c.id];

    const out=outstandingFor(c.id);
    const outTag=out>0?`<span style="font-size:10px;color:var(--red);margin-left:4px">⚠ ${fmtINR(out)}</span>`:amt>0?`<span style="font-size:10px;color:var(--green);margin-left:4px">✓</span>`:'';
    return `<div class="pl-item" onclick="showDetailById('${c.id}')"
      onmouseenter="this.style.borderLeftColor='${tier.color}';this.style.background='rgba(0,229,255,.02)'"
      onmouseleave="this.style.borderLeftColor='transparent';this.style.background=''">
      <div class="pl-av" style="background:${tier.bg};color:${tier.color};border-color:${tier.border}">${av}</div>
      <div class="pl-info">
        <div class="pl-name">${c.name}</div>
        <div class="pl-loc">${[c.city,c.district].filter(Boolean).join(' · ')||'LOCATION UNKNOWN'}</div>
      </div>
      <div class="pl-right">
        ${amt>0?`<div class="pl-amt" style="color:${tier.color}">${fmtINR(amt)}${badge}</div>`:'<div style="font-size:11px;color:var(--text3)">NO DATA</div>'}
        <div style="display:flex;align-items:center;justify-content:flex-end;gap:4px;margin-top:3px">
          <div class="pl-tier" style="background:${tier.bg};color:${tier.color};border:1px solid ${tier.border}">${tier.emoji} ${tier.name}</div>
          ${outTag}
        </div>
      </div>
      <div class="tr-chev">›</div>
    </div>`;
  }).join('');
}
function filterBiz(){
  const q=document.getElementById('search-inp').value.toLowerCase();
  renderPList((window._SC||[]).filter(c=>c.name.toLowerCase().includes(q)||c.city.toLowerCase().includes(q)||c.district.toLowerCase().includes(q)));
}

/* ═══════ QUESTS ═══════ */
function computeQuests(custId,curMo,prevMo){
  const cO=orders.filter(o=>o.custId===custId&&o.month===curMo);
  const pO=orders.filter(o=>o.custId===custId&&o.month===prevMo);
  const cnt=cO.length,tot=cO.reduce((s,o)=>s+o.amount,0);
  const ptot=pO.reduce((s,o)=>s+o.amount,0);
  const ct=getTier(tot),pt=getTier(ptot);
  const q3d=curMo&&prevMo&&tRank(ct)===tRank(pt)&&tRank(ct)>tRank(UNRANKED);
  const q1d=cnt>=2,q2d=tot>=20000;
  return [
    {icon:'📦',name:'FREQUENT BUYER',desc:'Place at least 2 orders this cycle',
     pct:Math.min(100,Math.round(Math.min(cnt,2)/2*100)),done:q1d,color:'#818CF8',
     progLbl:`${cnt} / 2 ORDERS`,tip:q1d?'MISSION COMPLETE ✓':`${2-cnt} ORDER${2-cnt>1?'S':''} REMAINING`},
    {icon:'💊',name:'HIGH DOSAGE',desc:'Dispense ₹20,000 or more this cycle',
     pct:Math.min(100,Math.round(Math.min(tot,20000)/20000*100)),done:q2d,color:'#FFB800',
     progLbl:`${fmtINR(tot)} / ₹20,000`,tip:q2d?'MISSION COMPLETE ✓':`${fmtINR(20000-tot)} REMAINING`},
    {icon:'🏰',name:'LEAGUE LOYALIST',desc:'Hold the same rank for two consecutive cycles',
     pct:q3d?100:(prevMo&&ptot>0&&tot>0?50:(tot>0?25:0)),done:q3d,color:'#00E5FF',
     progLbl:q3d?`${prevMo} + ${curMo} — ${ct.full}`:(prevMo&&ptot>0?`${pt.emoji}${pt.name} → ${ct.emoji}${ct.name}`:`ACTIVE IN ${curMo||'CURRENT'}`),
     tip:q3d?'MISSION COMPLETE ✓':(prevMo&&ptot>0&&tot>0?`RANKS DIFFER — HOLD ${ct.name}`:'NEED DATA IN BOTH CYCLES')},
  ];
}

function questHTML(quests,curMo){
  const done=quests.filter(q=>q.done).length;
  const avg=Math.round(quests.reduce((s,q)=>s+q.pct,0)/quests.length);
  const R=22,C=2*Math.PI*R,fill=Math.round(avg/100*C);
  const ringCol=avg===100?'#00FF88':'#FFB800';
  const ring=`<div class="qring-wrap">
    <svg width="54" height="54" viewBox="0 0 54 54">
      <circle cx="27" cy="27" r="${R}" fill="none" stroke="rgba(255,255,255,.06)" stroke-width="5"/>
      <circle cx="27" cy="27" r="${R}" fill="none" stroke="${ringCol}" stroke-width="5"
        stroke-dasharray="${fill} ${C}" stroke-linecap="round"
        style="filter:drop-shadow(0 0 4px ${ringCol})"/>
    </svg>
    <div class="qring-val">${avg}%</div>
  </div>`;

  const items=quests.map(q=>{
    const rc=q.done?'done':q.pct>=50?'mid':'low';
    const ic=q.done?'✓':q.pct>=50?'◑':'○';
    const bc=q.done?'#00FF88':q.pct>=50?q.color:'rgba(255,255,255,.1)';
    const pc=q.done?'var(--green)':q.pct>=50?q.color:'var(--text3)';
    return `<div class="qi">
      <div class="qi-pill" style="background:${q.color}12;border-color:${q.color}30">${q.icon}</div>
      <div class="qi-body">
        <div class="qi-name" style="color:${q.done?'var(--green)':q.color}">${q.name}</div>
        <div class="qi-desc">${q.desc}</div>
        <div class="xp-track">
          <div class="xp-fill" style="width:${q.pct}%;background:linear-gradient(90deg,${bc}88,${bc})"></div>
        </div>
        <div class="xp-row">
          <span class="xp-prog" style="color:${pc}">${q.progLbl}</span>
          <span class="xp-tip">${q.tip}</span>
        </div>
      </div>
      <div class="q-stat">
        <div class="q-orb ${rc}">${ic}</div>
        <div class="q-pct" style="color:${pc}">${q.pct}%</div>
      </div>
    </div>`;
  }).join('');

  return `<div class="quest-panel">
    <div class="qhd">
      <div class="qhd-left">
        <div class="qhd-icon">⚔️</div>
        <div><div class="qhd-ttl">ACTIVE MISSIONS</div><div class="qhd-sub">${curMo||'CURRENT CYCLE'} · ${done}/${quests.length} COMPLETE</div></div>
      </div>
      <div class="qhd-right">${ring}<div class="qscore"><div class="qscore-num">${done}/${quests.length}</div><div class="qscore-lbl">DONE</div></div></div>
    </div>
    <div>${items}</div>
  </div>`;
}

/* ═══════ DETAIL ═══════ */
function showDetailById(custId){
  /* Hard security boundary: a customer session can only ever render its
     own profile, no matter what custId gets passed in (defends against
     any stray onclick handler or leftover dashboard link). */
  if(AUTH&&AUTH.role==='customer'&&custId!==AUTH.custId)return;
  const c=customers.find(x=>x.id===custId);if(!c)return;
  const curMo=allMonths[0]||'',prevMo=allMonths[1]||'';
  const cOrds=orders.filter(o=>o.custId===custId);
  const mOrds=cOrds.filter(o=>o.month===curMo),pOrds=cOrds.filter(o=>o.month===prevMo);
  const mAmt=mOrds.reduce((s,o)=>s+o.amount,0),pAmt=pOrds.reduce((s,o)=>s+o.amount,0);
  const mCnt=mOrds.length,aAmt=cOrds.reduce((s,o)=>s+o.amount,0),aCnt=cOrds.length;
  const tier=getTier(mAmt),av=ini(c.name);
  const ct=getTier(mAmt),pt=getTier(pAmt);
  const tierChg=tRank(ct)!==tRank(pt)?(tRank(ct)>tRank(pt)?'up':'dn'):null;
  const chgBadge=tierChg?`<span class="chg-pill ${tierChg}">${tierChg==='up'?'▲ RANK UP':'▼ RANK DOWN'}</span>`:'';
  const chgBanner=tierChg?`<div class="chg-banner ${tierChg}" style="margin:16px 20px 0">

    <div>
      <div class="chg-banner-lbl ${tierChg}">${tierChg==='up'?'RANK PROMOTION!':'RANK DEMOTION'} — ${prevMo} → ${curMo}</div>
      <div class="chg-banner-tiers">${pt.emoji}<strong style="color:${pt.color}">${pt.full}</strong><span style="color:var(--text3)">──►</span><strong style="color:${ct.color}">${ct.emoji} ${ct.full}</strong></div>
    </div>
  </div>`:'';
  const diff=mAmt-pAmt,dS=diff>=0?'+':'',dC=diff>=0?'var(--green)':'var(--red)';
  const quests=computeQuests(custId,curMo,prevMo);

  /* ── Receipt data for this customer ── */
  const cRcpts=receipts.filter(r=>r.custId===custId);

  /* Sort receipts newest → oldest using cached parsed Date objects */
  const sRcpts=cRcpts.slice().sort((a,b)=>dateKey(b._d)-dateKey(a._d));

  /* Sort orders newest → oldest using cached parsed Date objects */
  const sOrds=cOrds.slice().sort((a,b)=>dateKey(b._d)-dateKey(a._d));

  /* ── Order & payment cadence + predictions (pass cached Date objects directly) ── */
  const orderCadence=computeCadence(cOrds.map(o=>o._d));
  const rcptCadence=computeCadence(cRcpts.map(r=>r._d));
  const predictHTML=buildPredictionHTML(orderCadence,rcptCadence);

  const mRcpts=cRcpts.filter(r=>r.month===curMo);
  const mCollected=mRcpts.reduce((s,r)=>s+r.amount,0);
  const aCollected=cRcpts.reduce((s,r)=>s+r.amount,0);
  const outstanding=outstandingFor(custId);
  const initOut=(customers.find(c=>c.id===custId)||{}).initOutstanding||0;
  const totalBase=initOut+aAmt;
  const collPct=totalBase>0?Math.min(100,Math.round(aCollected/totalBase*100)):0;
  const outColor=outstanding>0?'var(--red)':'var(--green)';

  const waNum=c.mobile.replace(/\D/g,'');
  const mobileHtml=c.mobile?`
    <div class="inf-val mono" style="margin-bottom:8px">${c.mobile}</div>
    <div class="cbtns">

        CALL
      </a>
      <a href="https://wa.me/91${waNum}" target="_blank" class="cbtn cbtn-wa">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"/></svg>
        WHATSAPP
      </a>
    </div>`:'<div class="inf-val" style="color:var(--text3)">—</div>';

  document.getElementById('page-detail').innerHTML=`
    <div class="det-panel" style="border-left-color:${tier.color}">
      <div class="det-top-bar">
        <div class="det-avatar" style="background:${tier.bg};color:${tier.color};border-color:${tier.border}">${av}</div>
        <div style="flex:1;min-width:0">
          <div class="det-name" style="color:${tier.text};text-shadow:0 0 16px ${tier.color}40">${c.name}</div>
          <div class="det-pills-row">
            <span class="det-tier-pill" style="background:${tier.bg};color:${tier.color};border:1px solid ${tier.border}">${tier.emoji} ${tier.full}</span>
            ${chgBadge}
          </div>
        </div>
      </div>
      ${chgBanner}
      <div class="info-grid" style="margin-top:${tierChg?'16px':'0'}">
        <div class="inf"><div class="inf-lbl">AGENT ID</div><div class="inf-val mono">${c.id}</div></div>
        <div class="inf"><div class="inf-lbl">COMMANDER</div><div class="inf-val">${c.owner||'—'}</div></div>
        <div class="inf s2">
          <div class="inf-lbl">COMM CHANNEL</div>
          ${mobileHtml}
        </div>
        <div class="inf"><div class="inf-lbl">SECTOR</div><div class="inf-val">${[c.city,c.district].filter(Boolean).join(' · ')||'—'}</div></div>
        <div class="inf"><div class="inf-lbl">RX LICENCE</div><div class="inf-val mono">${c.license||'—'}</div></div>
        <div class="inf s2"><div class="inf-lbl">COORDINATES</div><div class="inf-val">${c.address||'—'}</div></div>
      </div>
      <div class="stats-strip" style="grid-template-columns:repeat(3,1fr)">
        <div class="st">
          <div class="st-bar" style="background:${tier.color};box-shadow:0 0 8px ${tier.color}"></div>
          <div class="st-num" style="color:${tier.color};text-shadow:0 0 10px ${tier.color}60">${fmtINR(mAmt)}</div>
          <div class="st-lbl">ORDERED · ${curMo||'THIS CYCLE'}</div>
          ${pAmt>0?`<div class="st-diff" style="color:${dC}">${dS}${fmtINR(diff)}</div>`:''}
        </div>
        <div class="st">
          <div class="st-bar" style="background:var(--green)"></div>
          <div class="st-num" style="color:var(--green)">${fmtINR(mCollected)}</div>
          <div class="st-lbl">COLLECTED · ${curMo||'THIS CYCLE'}</div>
        </div>
        <div class="st">
          <div class="st-bar" style="background:${outColor}"></div>
          <div class="st-num" style="color:${outColor}">${fmtINR(outstanding)}</div>
          <div class="st-lbl">OUTSTANDING</div>
          <div class="st-diff" style="color:${collPct>=80?'var(--green)':collPct>=50?'var(--amber)':'var(--red)'}">${collPct}% PAID</div>
        </div>
        <div class="st">
          <div class="st-bar" style="background:${tier.color}"></div>
          <div class="st-num" style="color:${tier.color}">${mCnt}</div>
          <div class="st-lbl">ORDERS · ${curMo}</div>
        </div>
        <div class="st">
          <div class="st-bar" style="background:var(--text3)"></div>
          <div class="st-num" style="color:var(--text2)">${fmtINR(pAmt)}</div>
          <div class="st-lbl">${prevMo||'PREV CYCLE'}</div>
        </div>
        <div class="st">
          <div class="st-bar" style="background:var(--cyan)"></div>
          <div class="st-num" style="color:var(--cyan)">${fmtINR(aAmt)}</div>
          <div class="st-lbl">ALL-TIME BILLED</div>
        </div>
      </div>
    </div>

    ${buildProfileChartsHTML(custId,cOrds,cRcpts,initOut,aAmt,aCollected,outstanding)}

    ${questHTML(quests,curMo)}

    ${predictHTML}

    <div class="ord-panel" style="margin-bottom:12px">
      <div class="ord-hd">
        <div class="ord-hd-title">◈ PAYMENT RECEIPTS</div>
        <div style="display:flex;align-items:center;gap:10px">
          ${outstanding>0
            ?`<span class="outstanding-pill">⚠ ${fmtINR(outstanding)} DUE</span>`
            :`<span class="clear-pill">✓ ACCOUNT CLEAR</span>`}

          <div class="rcpt-sum-val" style="color:var(--green)">${fmtINR(aCollected)}</div>

          <div class="rcpt-sum-lbl">OUTSTANDING</div>
          <div class="rcpt-sum-val" style="color:${outColor}">${fmtINR(outstanding)}</div>

        <tbody>
          ${sRcpts.map((r,i)=>`<tr>
            <td style="color:var(--text3);font-family:'Share Tech Mono',monospace;font-size:11px">${String(sRcpts.length-i).padStart(2,'0')}</td>

    ${sOrds.length>0?`

          </tr>
        </thead>
        <tbody>
          ${sOrds.map(o=>`<tr>
            <td><span class="oid">${o.id}</span></td>
            <td style="font-family:'Share Tech Mono',monospace;font-size:12px;color:var(--text)">${fmtDateObj(o._d)}</td>
            <td class="ord-amt">${fmtINR(o.amount)}</td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>`
    :`<div class="empty-note" style="background:var(--panel);border-radius:var(--r);border:1px solid var(--border)">[ NO TRANSACTION RECORDS ]</div>`}
  `;
  showPage('detail');
}

/* ═══════ NAVIGATION ═══════ */
function showPage(page){
  ['dashboard','details','detail'].forEach(p=>document.getElementById('page-'+p).classList.remove('on'));
  document.getElementById('page-'+page).classList.add('on');
  const isD=page==='detail';
  document.getElementById('main-tabs').style.display=isD?'none':'flex';
  document.getElementById('nav-back').style.display=isD?'block':'none';
  document.getElementById('nav-home').style.display=isD?'block':'none';
  if(navStack[navStack.length-1]!==page)navStack.push(page);
  if(!isD)document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('on',(page==='dashboard'&&i===0)||(page==='details'&&i===1)));
  window.scrollTo(0,0);
}
function switchTab(page,el){
  if(AUTH&&AUTH.role==='customer')return; /* customers stay on their own profile */
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');navStack=[page];showPage(page);
  syncMobNav(page);
}
/* Mobile bottom-nav tap handler — mirrors switchTab's behaviour, including
   the same customer-session guard, but also updates the bottom nav's own
   active-state styling since it's a separate set of buttons from the
   desktop tab-rack. */
function mobNavTo(page){
  if(AUTH&&AUTH.role==='customer')return;
  navStack=[page];showPage(page);
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('on'));
  const matchingTab=page==='dashboard'?document.querySelector('.tab-rack .tab-btn:first-child'):document.getElementById('tab-agents-btn');
  if(matchingTab)matchingTab.classList.add('on');
  syncMobNav(page);
}
function syncMobNav(page){
  document.querySelectorAll('.mob-tab').forEach(b=>b.classList.remove('on'));
  const el=document.getElementById('mob-tab-'+page);
  if(el)el.classList.add('on');
}
function goHome(){
  if(AUTH&&AUTH.role==='customer'){showDetailById(AUTH.custId);return;}
  navStack=['dashboard'];showPage('dashboard');
}
function goBack(){
  if(AUTH&&AUTH.role==='customer')return; /* nothing to go back to */
  navStack.pop();showPage(navStack[navStack.length-1]||'dashboard');
}

bootApp();
</script>
